app = "slug-constitution"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[env]
  GENESIS_MS = "1775364391260"
  JSONL_PATH = "/data/ledger.jsonl"
  ROCKS_PATH = "/data/constitution.rocks"
  GIT_MIRROR_DIR = "/data/git"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "180s"
    method = "GET"
    path = "/api/health"

[[mounts]]
  source = "slug_data"
  destination = "/data"

[[vm]]
  memory = "4gb"
  cpu_kind = "shared"
  cpus = 2
